<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Decision System</title>
<style>
  body { font-family: Arial; margin:0; transition:.3s; }
  .dark { background:#0f172a; color:#e2e8f0; }
  .light { background:#f1f5f9; color:#0f172a; }header { padding:15px; display:flex; justify-content:space-between; background:linear-gradient(90deg,#6366f1,#8b5cf6); color:white; }

.container { padding:20px; }

.plan, .subplan { border-radius:12px; padding:15px; margin-bottom:10px; box-shadow:0 10px 20px rgba(0,0,0,0.2); } .plan { border:2px solid #6366f1; } .subplan { border:1px dashed #aaa; margin-left:20px; }

input, textarea { width:100%; margin-top:5px; }

button { margin:5px; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; font-weight:600; }

.active { background:#22c55e; color:white; } .failed { background:#ef4444; color:white; } .pending { background:#64748b; color:white; }

#graphView { display:none; padding:20px; }

.node { padding:10px 15px; border-radius:20px; display:inline-block; margin:10px; background:linear-gradient(135deg,#06b6d4,#3b82f6); color:white; font-weight:bold; }

.subnode { background:linear-gradient(135deg,#f59e0b,#ef4444); }

.line { height:2px; background:white; margin:5px 0; } </style>

</head>
<body class="dark"><header>
  <h2>AI Career Decision System</h2>
  <div>
    <button id="themeBtn">Theme</button>
    <button id="addPlanBtn">+ Plan</button>
    <button id="visualBtn">Visualize</button>
  </div>
</header><div class="container" id="app"></div>
<div id="graphView"></div><script>
let data = JSON.parse(localStorage.getItem('careerV2') || '[]');
let graphMode = false;

function save(){ localStorage.setItem('careerV2', JSON.stringify(data)); }

function render(){
  document.getElementById('graphView').style.display='none';
  document.getElementById('app').style.display='block';

  const app = document.getElementById('app');
  app.innerHTML='';

  data.forEach((plan,pi)=>{
    let div=document.createElement('div');
    div.className='plan';

    let title = document.createElement('input');
    title.value = plan.title;
    title.onchange = () => { plan.title = title.value; save(); };

    let addBtn = document.createElement('button');
    addBtn.innerText = '+ SubPlan';
    addBtn.onclick = () => addSub(pi);

    let delBtn = document.createElement('button');
    delBtn.innerText = 'Delete';
    delBtn.onclick = () => deletePlan(pi);

    div.appendChild(title);
    div.appendChild(addBtn);
    div.appendChild(delBtn);

    plan.sub.forEach((sp,si)=>{
      let s=document.createElement('div');
      s.className='subplan';

      let st = document.createElement('input');
      st.value = sp.title;
      st.onchange = () => { sp.title = st.value; save(); };

      let desc = document.createElement('textarea');
      desc.value = sp.desc;
      desc.onchange = () => { sp.desc = desc.value; save(); };

      let activeBtn = document.createElement('button');
      activeBtn.innerText='Active';
      activeBtn.className='active';
      activeBtn.onclick = () => setStatus(pi,si,'active');

      let failBtn = document.createElement('button');
      failBtn.innerText='Fail';
      failBtn.className='failed';
      failBtn.onclick = () => failPlan(pi,si);

      let pendBtn = document.createElement('button');
      pendBtn.innerText='Pending';
      pendBtn.className='pending';
      pendBtn.onclick = () => setStatus(pi,si,'pending');

      let del = document.createElement('button');
      del.innerText='Delete';
      del.onclick = () => deleteSub(pi,si);

      let status = document.createElement('div');
      status.innerText = 'Status: ' + sp.status;

      s.appendChild(st);
      s.appendChild(desc);
      s.appendChild(activeBtn);
      s.appendChild(failBtn);
      s.appendChild(pendBtn);
      s.appendChild(del);
      s.appendChild(status);

      div.appendChild(s);
    });

    app.appendChild(div);
  });
}

function renderGraph(){
  document.getElementById('app').style.display='none';
  const g = document.getElementById('graphView');
  g.style.display='block';
  g.innerHTML='';

  data.forEach(plan=>{
    let p = document.createElement('div');
    p.className='node';
    p.innerText = plan.title;
    g.appendChild(p);

    plan.sub.forEach(sp=>{
      let line = document.createElement('div');
      line.className='line';
      g.appendChild(line);

      let s = document.createElement('div');
      s.className='node subnode';
      s.innerText = sp.title + ' ('+sp.status+')';
      g.appendChild(s);
    });
  });
}

function addPlan(){ data.push({ title:'New Plan', sub:[] }); save(); render(); }
function deletePlan(i){ data.splice(i,1); save(); render(); }
function addSub(i){ data[i].sub.push({ title:'Sub Plan', desc:'', status:'pending' }); save(); render(); }
function deleteSub(pi,si){ data[pi].sub.splice(si,1); save(); render(); }

function setStatus(pi,si,status){ data[pi].sub[si].status=status; save(); render(); }

function failPlan(pi,si){
  data[pi].sub[si].status='failed';
  let next = data[pi].sub.find(p=>p.status==='pending');
  if(next) next.status='active';
  save(); render();
}

// BUTTONS

document.getElementById('addPlanBtn').onclick = addPlan;
document.getElementById('themeBtn').onclick = () => {
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
};

document.getElementById('visualBtn').onclick = () => {
  graphMode = !graphMode;
  if(graphMode) renderGraph(); else render();
};

render();
</script></body>
</html>
