<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Career Decision System</title>
<style>
  body { font-family: Arial; margin:0; background:#0f172a; color:#e2e8f0; }
  header { padding:15px; display:flex; justify-content:space-between; background:linear-gradient(90deg,#6366f1,#8b5cf6); color:white; }
  button { margin:5px; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }#tree { width:100%; height:80vh; overflow:auto; }

.node { position:absolute; padding:10px 15px; border-radius:20px; background:linear-gradient(135deg,#06b6d4,#3b82f6); color:white; cursor:pointer; }

.subnode { background:linear-gradient(135deg,#f59e0b,#ef4444); }

#descBox { position:fixed; bottom:0; left:0; width:100%; background:#020617; padding:15px; border-top:2px solid #6366f1; display:none; } </style>

</head>
<body><header>
  <h2>AI Career Decision System</h2>
  <div>
    <button onclick="addPlan()">+ Plan</button>
    <button onclick="renderTree()">Visualize</button>
  </div>
</header><svg id="lines" width="2000" height="1200" style="position:absolute; top:80px; left:0;"></svg>

<div id="tree"></div><div id="descBox"></div><script>
let data = JSON.parse(localStorage.getItem('careerV3') || '[]');

function save(){ localStorage.setItem('careerV3', JSON.stringify(data)); }

function addPlan(){
  data.push({ title:'New Plan', sub:[{title:'A', desc:'Example desc', status:'pending'}] });
  save();
  renderTree();
}

function renderTree(){
  const tree = document.getElementById('tree');
  const svg = document.getElementById('lines');
  tree.innerHTML='';
  svg.innerHTML='';

  let startX = 200;
  let startY = 100;

  data.forEach((plan,pi)=>{
    let x = startX + pi*300;
    let y = startY;

    let node = createNode(plan.title,x,y,false,()=>{});
    tree.appendChild(node);

    plan.sub.forEach((sp,si)=>{
      let sx = x;
      let sy = y + 120 + si*120;

      let sub = createNode(sp.title + ' ('+sp.status+')',sx,sy,true,()=>{
        showDesc(sp);
      });

      tree.appendChild(sub);

      drawLine(x+50,y+40,sx+50,sy);
    });
  });
}

function createNode(text,x,y,isSub,onclick){
  let div = document.createElement('div');
  div.className = 'node ' + (isSub ? 'subnode':'');
  div.innerText = text;
  div.style.left = x+'px';
  div.style.top = y+'px';
  div.onclick = onclick;
  return div;
}

function drawLine(x1,y1,x2,y2){
  const svg = document.getElementById('lines');
  let line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1);
  line.setAttribute('y1',y1);
  line.setAttribute('x2',x2);
  line.setAttribute('y2',y2);
  line.setAttribute('stroke','#94a3b8');
  line.setAttribute('stroke-width','2');
  svg.appendChild(line);
}

function showDesc(sp){
  const box = document.getElementById('descBox');
  box.style.display='block';
  box.innerHTML = `<b>${sp.title}</b><br>${sp.desc || 'No description'}`;
}

renderTree();
</script></body>
</html>
